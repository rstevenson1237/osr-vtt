name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    # Catches a broken production bundle (bad import, minifier choke, an
    # error svelte-check's looser checking misses) at PR time — previously
    # this only ran on push to main, inside deploy.yml, i.e. after merge.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test-emulators:
    # Vitest unit tests, the CampaignStore contract suite (Plan §7 Phase 6 —
    # run against both FirebaseStore and MemoryStore), Firebase rules tests,
    # and Playwright e2e all run inside a single `firebase emulators:exec`
    # invocation (see root package.json `test:all:emulators`) so they share
    # one emulator instance.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm --filter @osr-vtt/web exec playwright install --with-deps chromium
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm test:all:emulators
      # On failure, print each Playwright error-context (the DOM/accessibility
      # snapshot at failure) straight into the job log, so an e2e failure can be
      # diagnosed without downloading the artifact.
      - name: Dump Playwright error contexts on failure
        if: failure()
        shell: bash
        run: |
          shopt -s nullglob
          for f in apps/web/test-results/*/error-context.md; do
            echo "::group::$f"
            cat "$f"
            echo
            echo "::endgroup::"
          done
      # On failure, also keep the Playwright report/traces so they can be opened
      # locally if the log snapshot isn't enough.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
